name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]


env:
  SWIFT_VERSION: "6.2"

jobs:
  build:
    name: Build and Verify
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Install Tuist
        run: |
          curl -Ls https://github.com/tuist/tuist/releases/download/4.153.1/tuist.zip -o /tmp/tuist.zip
          unzip -o /tmp/tuist.zip -d /usr/local/bin/
          tuist version

      - name: Install Dependencies
        run: tuist install

      - name: Build Debug
        run: tuist build

      - name: Build Release
        run: tuist build ClaudeBar -- -configuration Release
